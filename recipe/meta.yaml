{% set name = "pybacktrack" %}
{% set version = "1.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 8b540d2839062ba4964b6635177e376b649ba360720040f1b519afd7f0cab1d3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pytest-runner
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - gmt >=5.0.0
    - numpy
    - pygplates
    - scipy

test:
  imports:
    - pybacktrack
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/EarthByte/pyBacktrack
  summary: A tool for reconstructing paleobathymetry on oceanic and continental crust.
  dev_url: https://github.com/EarthByte/pyBacktrack
  doc_url: https://pybacktrack.readthedocs.io
  license: GPL-2.0-only
  license_family: GPL2
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jcannon-gplates
